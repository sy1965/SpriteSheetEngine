<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Sheet Builder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            flex-direction: column;
            padding: 0;
            overflow: auto;
            min-height: 100vh;
            width: 100%;
        }
        .top-bar {
            width: 100%;
            background: var(--card-bg);
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
            flex-shrink: 0;
        }
        .top-bar h1 {
            font-size: 1.2rem;
            margin: 0;
            white-space: nowrap;
        }
        .builder-layout {
            display: flex;
            min-height: calc(100vh - 68px);
            width: 100%;
            overflow: auto;
            background: var(--bg-color);
        }
        .canvas-area {
            flex: 1;
            position: relative;
            overflow: auto; /* Enable scrolling for the workspace */
            background: #090e1a;
            display: flex;
            cursor: crosshair;
            padding: 100px;
        }
        #builderCanvas {
            background-image: 
                linear-gradient(45deg, #161e2e 25%, transparent 25%), 
                linear-gradient(-45deg, #161e2e 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #161e2e 75%), 
                linear-gradient(-45deg, transparent 75%, #161e2e 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            flex-shrink: 0;
            margin: auto;
        }
        .side-panel {
            width: 320px;
            background: var(--card-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 24px;
            overflow-y: auto; /* Handle sidebar overflow */
            flex-shrink: 0;
        }
        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .tool-group h3 {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .small-input {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .small-input label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        input[type="number"], select {
            padding: 8px 12px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            width: 100%;
        }
        .action-btns {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .lock-status {
            font-size: 0.85rem;
            padding: 12px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            line-height: 1.4;
        }
        .cell-indicator {
            font-weight: 600;
            color: var(--accent-color);
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        .export-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .export-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }
        @media (max-width: 1000px) {
            .top-bar {
                flex-wrap: wrap;
                align-items: flex-start;
            }
            .builder-layout {
                flex-direction: column;
                min-height: auto;
            }
            .side-panel {
                width: 100%;
                max-height: none;
                border-left: 0;
                border-top: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="nav-link">← Runner</a>
        <h1>Sprite Sheet Builder</h1>
        
        <div class="upload-btn-wrapper">
            <button class="secondary-btn">Upload Image</button>
            <input type="file" id="imageUpload" accept="image/*" />
        </div>

        <div class="input-grid" style="width: auto; gap: 12px; grid-template-columns: repeat(4, auto);">
            <div class="small-input">
                <label>Cols</label>
                <input type="number" id="gridCols" value="3" style="width: 50px;">
            </div>
            <div class="small-input">
                <label>Rows</label>
                <input type="number" id="gridRows" value="3" style="width: 50px;">
            </div>
            <div class="small-input">
                <label>Cell W</label>
                <input type="number" id="cellWidth" value="246" style="width: 70px;">
            </div>
            <div class="small-input">
                <label>Cell H</label>
                <input type="number" id="cellHeight" value="284" style="width: 70px;">
            </div>
            <div class="small-input" style="justify-content: flex-end;">
                <button id="lockGridBtn" class="secondary-btn" style="height: 38px; padding: 0 10px; font-size: 0.75rem;">Lock Grid</button>
            </div>
        </div>

        <button id="exportBtn" class="export-btn">Export Sheet</button>
    </div>

    <div class="builder-layout">
        <div class="canvas-area" id="canvasArea">
            <canvas id="builderCanvas"></canvas>
        </div>

        <div class="side-panel">
            <div class="tool-group">
                <h3>Current Cell</h3>
                <div class="lock-status">
                    Editing Cell: <span class="cell-indicator" id="activeCellLabel">0, 0</span><br>
                    <small id="cellLockStatus">Status: Designing...</small>
                </div>
                
                <div class="small-input" style="margin-top: 8px;">
                    <label>Cell Zoom: <span id="zoomValue">100</span>%</label>
                    <input type="range" id="cellZoom" min="10" max="400" value="100">
                </div>

                <div class="action-btns" style="margin-top: 8px; grid-template-columns: 1fr 1fr;">
                    <button id="lockFrameBtn" class="primary-btn" style="grid-column: span 2;">Lock Frame</button>
                    <button id="lockRowBtn" class="secondary-btn" style="font-size: 0.8rem;">Lock Row</button>
                    <button id="lockColBtn" class="secondary-btn" style="font-size: 0.8rem;">Lock Col</button>
                    <button id="clearFrameBtn" class="secondary-btn" style="grid-column: span 2;">Clear Cell</button>
                </div>
            </div>

            <div class="tool-group">
                <h3>Manual Offset</h3>
                <div class="input-grid">
                    <div class="small-input">
                        <label>Off X</label>
                        <input type="number" id="offsetX" value="0">
                    </div>
                    <div class="small-input">
                        <label>Off Y</label>
                        <input type="number" id="offsetY" value="0">
                    </div>
                </div>
                <button id="resetPosBtn" class="secondary-btn">Reset Position</button>
                <p style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 8px; line-height: 1.4;">
                    💡 Use <b>Mouse Wheel</b> to zoom and <b>Drag</b> within a cell to align. Sub-grids help center characters.
                </p>
            </div>

            <div class="tool-group">
                <h3>Locked Progression</h3>
                <p style="font-size: 0.8rem; color: var(--text-secondary);">
                    Progress: <span id="lockedCount" style="color: var(--accent-color); font-weight: 600;">0</span> / <span id="totalCellsCount">20</span>
                </p>
                <div id="lockedList" style="font-size: 0.7rem; color: var(--text-secondary); border-top: 1px solid var(--border-color); padding-top: 10px; display: flex; flex-direction: column; gap: 4px;">
                    <!-- List of locked frames -->
                </div>
            </div>
        </div>
    </div>

    <script src="editor.js"></script>
</body>
</html>
